# CI: PHPUnit matrix + Vitest + coverage (PHP PCOV).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['7.0', '8.0']
        exclude:
          - php: '8.2'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: pcov
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-

      - name: Install dependencies with Symfony ${{ matrix.symfony }}
        run: |
          composer require symfony/config:^${{ matrix.symfony }} symfony/dependency-injection:^${{ matrix.symfony }} symfony/form:^${{ matrix.symfony }} symfony/framework-bundle:^${{ matrix.symfony }} symfony/http-foundation:^${{ matrix.symfony }} symfony/http-kernel:^${{ matrix.symfony }} symfony/routing:^${{ matrix.symfony }} symfony/twig-bundle:^${{ matrix.symfony }} symfony/web-profiler-bundle:^${{ matrix.symfony }} --no-interaction --no-update
          composer update symfony/* --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: composer test

      - name: PHPUnit coverage (PHP 8.2 + Symfony 7.0)
        if: matrix.php == '8.2' && matrix.symfony == '7.0'
        run: composer test-coverage

      - name: Validate PHP coverage file
        if: matrix.php == '8.2' && matrix.symfony == '7.0'
        run: test -f coverage.xml || (echo 'coverage.xml missing' && exit 1)

  typescript:
    name: Vitest (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install JS deps and run Vitest coverage
        run: |
          pnpm install --frozen-lockfile
          pnpm run test:coverage

  code-style-check:
    name: PHP CS Fixer (dry-run)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress --no-interaction

      - run: composer cs-check

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress --no-interaction

      - run: composer phpstan
