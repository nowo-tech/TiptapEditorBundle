# nowo_tiptap_editor — opciones del bundle
#
# Raíz:
#   default_config: nombre del perfil cuando el campo no usa la opción de formulario `config`.
#
# configs.<nombre>:
#   variant:        default | simple | notion | agent | headless  (preset UX/CSS/JS)
#   toolbar:        bool — barra de formato (negrita, listas, deshacer…)
#   min_height:     alto mínimo del área de edición (p. ej. 240px, 12rem)
#   form_theme:     layout de formulario Symfony (debe coincidir con twig.form_themes)
#   debug:          bool — logs detallados en consola del navegador (script del bundle)
#   theme:          light | dark | auto  — paleta del chrome (auto sigue prefers-color-scheme)

nowo_tiptap_editor:
    default_config: simple
    configs:
        full:
            variant: default
            toolbar: true
            min_height: 280px
            form_theme: form_div_layout.html.twig
            debug: true
            theme: light
        simple:
            variant: simple
            toolbar: true
            min_height: 200px
            form_theme: form_div_layout.html.twig
            debug: false
            theme: light
        notion:
            variant: notion
            toolbar: true
            min_height: 520px
            form_theme: form_div_layout.html.twig
            debug: false
            theme: light
        agent:
            variant: agent
            toolbar: true
            min_height: 360px
            form_theme: form_div_layout.html.twig
            debug: true
            theme: light
        headless:
            variant: headless
            toolbar: true
            min_height: 320px
            form_theme: form_div_layout.html.twig
            debug: false
            theme: light
