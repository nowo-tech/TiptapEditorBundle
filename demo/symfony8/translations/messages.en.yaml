  card:
    default-text-editor:
      title: 'Default text editor'
      desc: 'StarterKit + Link + Underline + TextAlign — same baseline as the docs “default” walkthrough.'
    formatting:
      title: 'Formatting'
      desc: 'Highlight, subscript and superscript on top of the usual marks.'
    images:
      title: 'Images'
      desc: 'Image extension with toolbar prompt for remote URLs.'
    long-text:
      title: 'Long texts'
      desc: 'Character/word counter via CharacterCount — tall surface for scrolling.'
    markdown-shortcuts:
      title: 'Markdown shortcuts'
      desc: 'Typography extension for smart punctuation; typing shortcuts still come from StarterKit input rules.'
    minimal-setup:
      title: 'Minimal setup'
      desc: 'Very small StarterKit slice — paragraphs, bold/italic/code and hard breaks only.'
    tables:
      title: 'Tables'
      desc: 'Resizable tables with insert/add row/header helpers on the toolbar.'
    tasks:
      title: 'Tasks'
      desc: 'Task list + nested task items.'
    text-direction-rtl:
      title: 'Text direction & RTL'
      desc: 'RTL paragraph surface (dir + lang on ProseMirror).'
    menus:
      title: 'Menus'
      desc: 'Bubble menu for marks + floating hint — same ideas as bubble/floating menus in the docs.'
    syntax-highlighting:
      title: 'Syntax highlighting'
      desc: 'CodeBlockLowlight + lowlight common bundle for fenced code blocks.'
    clever-editor:
      title: 'Clever editor'
      desc: 'Custom replacement rules — follow the official clever-editor sample.'
    collaborative-editing:
      title: 'Collaborative editing'
      desc: 'Needs Yjs/Hocuspocus or Tiptap Cloud — see Collaboration docs.'
    drawing:
      title: 'Drawing'
      desc: 'Custom node view drawing demo — upstream uses ProseMirror node views.'
    forced-content-structure:
      title: 'Forced content structure'
      desc: 'Restrict document schema with custom extensions — see upstream guide.'
    interactive-react-vue:
      title: 'Interactive React & Vue views'
      desc: 'Embed framework components as node views — React/Vue examples in docs.'
    react-performance:
      title: 'React performance'
      desc: 'Advice and patterns from Tiptap’s React performance article.'
    mentions:
      title: 'Mentions'
      desc: 'Mention + suggestion menus — usually needs @tiptap/suggestion and a popper/tippy layer.'
    ai-agent:
      title: 'AI agent (experiment)'
      desc: 'AI Toolkit / agents editing documents — platform feature; see AI Toolkit product pages.'
    collaborative-fields:
      title: 'Collaborative fields'
      desc: 'Experimental multi-field Yjs doc — advanced collaboration pattern.'
    figure:
      title: 'Figure'
      desc: 'Figure node experiments from Tiptap docs.'
    generic-figure:
      title: 'Generic figure'
      desc: 'Generic figure extension pattern — see upstream experiment.'
    iframe:
      title: 'iFrame'
      desc: 'Embed iframe nodes — custom extension walkthrough.'
    linting:
      title: 'Linting'
      desc: 'Document linter experiment — rules run against ProseMirror doc.'
    slash-commands:
      title: 'Slash commands'
      desc: 'Slash palette UI — typically Notion-like template / Platform UI components.'

